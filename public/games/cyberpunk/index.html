<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Cyberpunk: The Incredible Bloom Cube</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        #loading {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #000;
            color: #a78bfa; font-family: monospace; gap: 12px; z-index: 10;
        }
        #loading.hidden { display: none; }
        #error { display: none; }
        #error.show { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .spinner {
            width: 32px; height: 32px; border: 3px solid #a78bfa33;
            border-top-color: #a78bfa; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="font-size:14px;">Loading WASM...</div>
        <div style="font-size:10px;color:#666;">Rust + Bevy Engine</div>
        <div id="error">
            <div style="color:#f87171;font-size:14px;">Failed to load game</div>
            <button onclick="location.reload()" style="margin-top:8px;padding:8px 16px;background:#1a1a1a;border:1px solid #333;color:#aaa;border-radius:8px;cursor:pointer;font-family:monospace;">Reload</button>
        </div>
    </div>
    <canvas id="game-canvas"></canvas>
    <script type="module">
        import init, * as bindings from '/games/cyberpunk/cyberpunk_rpg-a419bae5742e9513.js';
        try {
            const wasm = await init({ module_or_path: '/games/cyberpunk/cyberpunk_rpg-a419bae5742e9513_bg.wasm' });
            window.wasmBindings = bindings;
            document.getElementById('loading').classList.add('hidden');
            dispatchEvent(new CustomEvent("TrunkApplicationStarted", { detail: { wasm } }));
        } catch (e) {
            document.querySelector('.spinner').style.display = 'none';
            document.getElementById('error').classList.add('show');
            console.error('WASM load failed:', e);
        }
    </script>
</body>
</html>
