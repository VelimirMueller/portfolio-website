<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Cyberpunk Arcade Shooter — Velimir Müller</title>
    <meta name="description" content="A neon-drenched arcade shooter built with Rust and Bevy, compiled to WebAssembly. Play in your browser." />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
        canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }

        /* Top bar */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 20;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }
        .back-link {
            display: flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;
            pointer-events: auto; transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }
        .back-link svg { width: 14px; height: 14px; }
        .controls-hint { color: rgba(255,255,255,0.3); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; }

        /* Loading overlay */
        #loading {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; gap: 16px;
        }
        #loading.hidden { display: none; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(249,115,22,0.2);
            border-top-color: #f97316;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .load-text { color: rgba(255,255,255,0.5); font-size: 13px; }
        .load-sub { color: rgba(255,255,255,0.25); font-size: 10px; }

        /* Version badge */
        .version-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 999px;
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .version-badge.desktop {
            background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
            color: rgba(129,140,248,0.9);
        }
        .version-badge.mobile {
            background: rgba(249,115,22,0.15); border: 1px solid rgba(249,115,22,0.3);
            color: rgba(251,146,60,0.9);
        }
        .version-badge .dot {
            width: 6px; height: 6px; border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        .version-badge.desktop .dot { background: #818cf8; }
        .version-badge.mobile .dot { background: #fb923c; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Error state */
        #error { display: none; flex-direction: column; align-items: center; gap: 12px; }
        #error.show { display: flex; }
        .error-text { color: #f87171; font-size: 14px; }
        .error-detail { color: rgba(255,255,255,0.3); font-size: 11px; max-width: 400px; text-align: center; }
        .reload-btn {
            margin-top: 8px; padding: 8px 20px; background: #1a1a1a;
            border: 1px solid #333; color: #aaa; border-radius: 8px;
            cursor: pointer; font-family: inherit; font-size: 12px;
            transition: border-color 0.2s;
        }
        .reload-btn:hover { border-color: #666; }

        /* Rotate prompt for portrait mobile */
        #rotate-prompt {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: #000; color: #fff;
            flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        }
        #rotate-prompt .rotate-icon { font-size: 48px; animation: wiggle 1.5s ease-in-out infinite; }
        #rotate-prompt .rotate-text { font-size: 14px; color: rgba(255,255,255,0.6); }
        #rotate-prompt .rotate-sub { font-size: 11px; color: rgba(255,255,255,0.3); }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-15deg); }
            75% { transform: rotate(15deg); }
        }

        /* Mobile touch controls */
        .touch-controls {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
            padding: 12px 16px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }
        .touch-inner {
            display: flex; align-items: flex-end; justify-content: space-between;
            max-width: 560px; margin: 0 auto;
            pointer-events: auto;
        }
        .dpad { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .dpad-row { display: flex; gap: 4px; }
        .actions { display: flex; align-items: center; gap: 10px; }
        .touch-btn {
            width: 52px; height: 52px; border-radius: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.8);
            font-size: 13px; font-weight: bold; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            user-select: none; touch-action: none;
        }
        .touch-btn.active { background: rgba(255,255,255,0.3); transform: scale(0.9); }
        .touch-btn.large {
            width: 68px; height: 68px; font-size: 18px;
            background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.4);
        }
        .touch-btn.large.active { background: rgba(239,68,68,0.5); }
        .touch-btn.start-btn {
            width: 52px; height: 52px;
            background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.3);
        }
        .touch-btn.start-btn.active { background: rgba(34,197,94,0.4); }

        @media (pointer: coarse), (hover: none) {
            .touch-controls { display: block; }
            .controls-hint-desktop { display: none; }
        }
    </style>
</head>
<body>
    <!-- Rotate prompt for portrait mobile -->
    <div id="rotate-prompt">
        <div class="rotate-icon">📱↻</div>
        <div class="rotate-text">Rotate to landscape</div>
        <div class="rotate-sub">This game plays best in horizontal orientation</div>
        <button class="reload-btn" id="fullscreen-btn" style="margin-top:12px">Enter Fullscreen</button>
    </div>

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/en/projects" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>
        <span class="controls-hint controls-hint-desktop">WASD · Space · Enter</span>
        <span class="controls-hint" style="display:none" id="touch-hint">Touch Controls</span>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div id="version-badge" class="version-badge desktop">
            <span class="dot"></span>
            <span id="version-label">Desktop</span>
        </div>
        <div class="spinner"></div>
        <div class="load-text">Loading <span id="load-version">Desktop</span> Build...</div>
        <div class="load-sub" id="load-detail">~36MB · Rust + Bevy Engine</div>
        <div id="error">
            <div class="error-text">Failed to load game</div>
            <div class="error-detail" id="error-msg"></div>
            <button class="reload-btn" onclick="location.reload()">Reload</button>
        </div>
    </div>

    <!-- Game canvas — Bevy looks for #game-canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Mobile touch controls -->
    <div class="touch-controls" id="touch-controls">
        <div class="touch-inner">
            <div class="dpad">
                <button class="touch-btn" data-key="w" data-code="KeyW">W</button>
                <div class="dpad-row">
                    <button class="touch-btn" data-key="a" data-code="KeyA">A</button>
                    <button class="touch-btn" data-key="s" data-code="KeyS">S</button>
                    <button class="touch-btn" data-key="d" data-code="KeyD">D</button>
                </div>
            </div>
            <div class="actions">
                <button class="touch-btn start-btn" data-key="Enter" data-code="Enter">▶</button>
                <button class="touch-btn large" data-key=" " data-code="Space">⊕</button>
            </div>
        </div>
    </div>

    <script>
        var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        var isSmallScreen = window.innerWidth < 768 || (isMobile && window.innerWidth < 1024);
        var useMobileVersion = isMobile || isSmallScreen;
        var canvas = document.getElementById('game-canvas');
        var rotatePrompt = document.getElementById('rotate-prompt');

        // Update loading screen to reflect which version is loading
        if (useMobileVersion) {
            document.getElementById('version-badge').className = 'version-badge mobile';
            document.getElementById('version-label').textContent = 'Mobile';
            document.getElementById('load-version').textContent = 'Mobile';
            document.getElementById('load-detail').textContent = '~14MB · Optimized Mobile Build';
        }

        // Mobile setup
        if (isMobile) {
            document.getElementById('touch-hint').style.display = '';
            var desktopHint = document.querySelector('.controls-hint-desktop');
            if (desktopHint) desktopHint.style.display = 'none';

            // Fullscreen + landscape lock
            document.getElementById('fullscreen-btn').addEventListener('click', function() {
                var el = document.documentElement;
                var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (rfs) {
                    rfs.call(el).then(function() {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock('landscape').catch(function() {});
                        }
                    }).catch(function() {});
                }
                rotatePrompt.style.display = 'none';
            });

            // Show rotate prompt in portrait
            function checkOrientation() {
                if (!document.fullscreenElement && window.innerHeight > window.innerWidth) {
                    rotatePrompt.style.display = 'flex';
                } else {
                    rotatePrompt.style.display = 'none';
                }
            }
            window.addEventListener('resize', checkOrientation);
            window.addEventListener('orientationchange', checkOrientation);
            document.addEventListener('fullscreenchange', checkOrientation);
            setTimeout(checkOrientation, 300);
        }

        // Touch controls — dispatch to CANVAS (where Bevy/winit listens)
        document.querySelectorAll('.touch-btn').forEach(function(btn) {
            var key = btn.dataset.key;
            var code = btn.dataset.code;
            var interval = null;
            var pressed = false;

            function fireKey(type) {
                canvas.dispatchEvent(new KeyboardEvent(type, {
                    key: key, code: code, bubbles: true, cancelable: true
                }));
            }

            function startPress(e) {
                e.preventDefault();
                e.stopPropagation();
                if (pressed) return;
                pressed = true;
                btn.classList.add('active');
                fireKey('keydown');
                interval = setInterval(function() { fireKey('keydown'); }, 60);
            }

            function endPress(e) {
                e.preventDefault();
                e.stopPropagation();
                if (!pressed) return;
                pressed = false;
                btn.classList.remove('active');
                fireKey('keyup');
                clearInterval(interval);
                interval = null;
            }

            btn.addEventListener('touchstart', startPress, { passive: false });
            btn.addEventListener('touchend', endPress, { passive: false });
            btn.addEventListener('touchcancel', endPress, { passive: false });
            btn.addEventListener('mousedown', startPress);
            btn.addEventListener('mouseup', endPress);
            btn.addEventListener('mouseleave', endPress);
        });

        // Prevent default touch actions on the game area to avoid scrolling
        document.body.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });
    </script>

    <script type="module">
        var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        var isSmallScreen = window.innerWidth < 768 || (isMobile && window.innerWidth < 1024);
        var useMobileVersion = isMobile || isSmallScreen;

        try {
            var mod;
            if (useMobileVersion) {
                mod = await import('/games/cyberpunk_mobile/cyberpunk_rpg-2d7ec96c04b7370c.js');
                await mod.default({ module_or_path: '/games/cyberpunk_mobile/cyberpunk_rpg-2d7ec96c04b7370c_bg.wasm' });
            } else {
                mod = await import('/games/cyberpunk/game.js');
                await mod.default({ module_or_path: '/games/cyberpunk/game_bg.wasm' });
            }

            document.getElementById('loading').classList.add('hidden');

            // Auto-check orientation on mobile after game loads
            if (isMobile) {
                setTimeout(function() {
                    if (window.innerHeight > window.innerWidth) {
                        document.getElementById('rotate-prompt').style.display = 'flex';
                    }
                }, 500);
            }
        } catch (e) {
            console.error('WASM init failed:', e);
            document.querySelector('.spinner').style.display = 'none';
            document.querySelector('.load-text').style.display = 'none';
            document.querySelector('.load-sub').style.display = 'none';
            document.getElementById('error-msg').textContent = e.message || 'Unknown error';
            document.getElementById('error').classList.add('show');
        }
    </script>
</body>
</html>
