<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Cyberpunk Arcade Shooter — Velimir Müller</title>
    <meta name="description" content="A neon-drenched arcade shooter built with Rust and Bevy, compiled to WebAssembly. Play in your browser." />
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; touch-action: none; will-change: transform; contain: strict; }

        /* ── Top bar ── */
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 20;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            background: rgba(0,0,0,0.6);
            pointer-events: none;
            contain: layout style;
        }
        .back-link {
            display: flex; align-items: center; gap: 6px;
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 12px;
            pointer-events: auto; transition: color 0.2s;
        }
        .back-link:hover { color: #fff; }
        .back-link svg { width: 14px; height: 14px; }
        .controls-hint { color: rgba(255,255,255,0.3); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; }
        .top-bar.auto-hide { opacity: 0; transition: opacity 1s ease-out; }
        .top-bar.auto-hide:hover, .top-bar.auto-hide:active { opacity: 1; transition: opacity 0.2s; }

        /* ── Loading overlay ── */
        #loading {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; gap: 20px;
            transition: opacity 0.4s ease-out;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }

        /* Scanline overlay */
        #loading::before {
            content: ''; position: absolute; inset: 0; pointer-events: none;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px
            );
        }

        .game-title {
            font-size: 16px; font-weight: 700; letter-spacing: 6px;
            text-transform: uppercase; color: rgba(255,255,255,0.85);
            text-shadow: 0 0 20px rgba(249,115,22,0.4), 0 0 60px rgba(249,115,22,0.1);
        }

        /* Version badge */
        .version-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 999px;
            font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        .version-badge.desktop {
            background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25);
            color: rgba(129,140,248,0.85);
        }
        .version-badge.mobile {
            background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.25);
            color: rgba(251,146,60,0.85);
        }
        .version-badge .dot {
            width: 6px; height: 6px; border-radius: 50%;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        .version-badge.desktop .dot { background: #818cf8; }
        .version-badge.mobile .dot { background: #fb923c; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Progress bar */
        .progress-wrap {
            width: min(300px, 75vw);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .progress-track {
            width: 100%; height: 3px;
            background: rgba(255,255,255,0.06); border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%; width: 0%; border-radius: 2px;
            background: linear-gradient(90deg, #f97316, #fb923c);
            box-shadow: 0 0 10px rgba(249,115,22,0.5), 0 0 30px rgba(249,115,22,0.15);
            transition: width 0.2s ease-out;
        }
        .progress-fill.pulse {
            animation: bar-pulse 1.6s ease-in-out infinite;
        }
        @keyframes bar-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .load-info {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
        }
        .load-text { color: rgba(255,255,255,0.45); font-size: 11px; letter-spacing: 0.3px; }
        .load-detail { color: rgba(255,255,255,0.2); font-size: 10px; }

        /* Error */
        #error { display: none; flex-direction: column; align-items: center; gap: 12px; }
        #error.show { display: flex; }
        .error-text { color: #f87171; font-size: 14px; }
        .error-detail { color: rgba(255,255,255,0.3); font-size: 11px; max-width: 400px; text-align: center; word-break: break-word; }
        .reload-btn {
            padding: 8px 20px; background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.5);
            border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px;
            transition: all 0.2s;
        }
        .reload-btn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }

        /* ── Rotate prompt ── */
        #rotate-prompt {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: #000; color: #fff;
            flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        }
        #rotate-prompt .rotate-icon { font-size: 48px; animation: wiggle 1.5s ease-in-out infinite; }
        #rotate-prompt .rotate-text { font-size: 14px; color: rgba(255,255,255,0.6); }
        #rotate-prompt .rotate-sub { font-size: 11px; color: rgba(255,255,255,0.3); }
        @keyframes wiggle { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }

        /* ── Touch controls ── */
        .touch-controls {
            display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
            padding: 8px 20px;
            padding-bottom: max(14px, env(safe-area-inset-bottom));
            pointer-events: none;
            contain: layout style;
        }
        .touch-inner {
            display: flex; align-items: flex-end; justify-content: space-between;
            max-width: 600px; margin: 0 auto;
            pointer-events: auto;
        }
        .dpad { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .dpad-row { display: flex; gap: 4px; }
        .actions { display: flex; align-items: center; gap: 12px; }

        .touch-btn {
            width: 56px; height: 56px; border-radius: 14px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.6);
            font-size: 13px; font-weight: 700; font-family: inherit;
            display: flex; align-items: center; justify-content: center;
            user-select: none; touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .touch-btn.active {
            background: rgba(249,115,22,0.25);
            border-color: rgba(249,115,22,0.5);
            color: #fff;
        }
        .touch-btn.fire {
            width: 72px; height: 72px; border-radius: 50%;
            font-size: 20px;
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.25);
        }
        .touch-btn.fire.active {
            background: rgba(239,68,68,0.35);
            border-color: rgba(239,68,68,0.6);
        }
        .touch-btn.start-btn {
            width: 48px; height: 48px;
            font-size: 15px;
            background: rgba(34,197,94,0.08);
            border-color: rgba(34,197,94,0.2);
        }
        .touch-btn.start-btn.active {
            background: rgba(34,197,94,0.3);
            border-color: rgba(34,197,94,0.5);
        }

        @media (pointer: coarse), (hover: none) {
            .touch-controls { display: block; }
            .controls-hint-desktop { display: none; }
        }
    </style>
</head>
<body>
    <!-- Rotate prompt -->
    <div id="rotate-prompt">
        <div class="rotate-icon">📱↻</div>
        <div class="rotate-text">Rotate to landscape</div>
        <div class="rotate-sub">This game plays best in horizontal orientation</div>
        <button class="reload-btn" id="fullscreen-btn" style="margin-top:12px">Enter Fullscreen</button>
    </div>

    <!-- Top bar -->
    <div class="top-bar">
        <a href="/en/projects" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>
        <span class="controls-hint controls-hint-desktop">WASD · Space · Enter</span>
        <span class="controls-hint" style="display:none" id="touch-hint">Touch Controls</span>
    </div>

    <!-- Loading -->
    <div id="loading">
        <div id="version-badge" class="version-badge desktop">
            <span class="dot"></span>
            <span id="version-label">Desktop</span>
        </div>
        <div class="game-title">Cyberpunk Arcade</div>
        <div class="progress-wrap">
            <div class="progress-track">
                <div class="progress-fill pulse" id="progress-fill"></div>
            </div>
            <div class="load-info">
                <div class="load-text" id="load-text">Initializing...</div>
                <div class="load-detail" id="load-detail">Rust + Bevy Engine</div>
            </div>
        </div>
        <div id="error">
            <div class="error-text">Failed to load game</div>
            <div class="error-detail" id="error-msg"></div>
            <button class="reload-btn" onclick="location.reload()">Reload</button>
        </div>
    </div>

    <!-- Game canvas — Bevy targets #game-canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Touch controls -->
    <div class="touch-controls" id="touch-controls">
        <div class="touch-inner">
            <div class="dpad">
                <button class="touch-btn" data-key="w" data-code="KeyW">W</button>
                <div class="dpad-row">
                    <button class="touch-btn" data-key="a" data-code="KeyA">A</button>
                    <button class="touch-btn" data-key="s" data-code="KeyS">S</button>
                    <button class="touch-btn" data-key="d" data-code="KeyD">D</button>
                </div>
            </div>
            <div class="actions">
                <button class="touch-btn start-btn" data-key="Enter" data-code="Enter">▶</button>
                <button class="touch-btn fire" data-key=" " data-code="Space">⊕</button>
            </div>
        </div>
    </div>

    <script>
        /* ── Device detection ── */
        var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        var isSmallScreen = window.innerWidth < 768 || (isMobile && window.innerWidth < 1024);
        var useMobileVersion = isMobile || isSmallScreen;
        var canvas = document.getElementById('game-canvas');
        var rotatePrompt = document.getElementById('rotate-prompt');
        var wasmCrashed = false;

        /* ── FIX: Silent AudioContext stub for mobile ──
         * The Bevy WASM build panics in bevy_audio when decoding audio
         * (UnrecognizedFormat). Setting AudioContext=undefined caused a worse
         * problem: unprotected bindings (currentTime, start, connect) threw
         * TypeErrors inside the game loop, aborting every frame that tried
         * to play sound — so shooting never worked.
         *
         * This stub provides a fully functional but silent AudioContext.
         * All Web Audio API calls succeed (returning no-op nodes), the game
         * loop never panics, and bullets spawn normally. No audio on mobile. */
        if (useMobileVersion) {
            (function() {
                function SilentNode() {
                    this.numberOfInputs = 1;
                    this.numberOfOutputs = 1;
                    this.channelCount = 2;
                    this.buffer = null;
                    this.loop = false;
                    this.onended = null;
                }
                SilentNode.prototype.connect = function() { return this; };
                SilentNode.prototype.disconnect = function() {};
                SilentNode.prototype.start = function() {
                    var self = this;
                    if (self.onended) setTimeout(function() { if (self.onended) self.onended(); }, 0);
                };
                SilentNode.prototype.stop = function() {};
                SilentNode.prototype.addEventListener = function() {};
                SilentNode.prototype.removeEventListener = function() {};

                function SilentDestination() {
                    this.maxChannelCount = 2;
                    this.channelCount = 2;
                    this.numberOfInputs = 1;
                    this.numberOfOutputs = 0;
                }
                SilentDestination.prototype.connect = function() { return this; };
                SilentDestination.prototype.disconnect = function() {};

                function SilentAudioContext() {
                    this.state = 'running';
                    this.sampleRate = 44100;
                    this._t0 = performance.now();
                    this.destination = new SilentDestination();
                }
                Object.defineProperty(SilentAudioContext.prototype, 'currentTime', {
                    get: function() { return (performance.now() - this._t0) / 1000; }
                });
                var p = SilentAudioContext.prototype;
                p.createBuffer = function(ch, len, rate) {
                    var s = rate || this.sampleRate;
                    var l = len || 1;
                    var buf = { sampleRate: s, length: l, numberOfChannels: ch || 1, duration: l / s };
                    buf.getChannelData = function() { return new Float32Array(l); };
                    buf.copyToChannel = function() {};
                    return buf;
                };
                p.createBufferSource = function() {
                    return new SilentNode();
                };
                p.decodeAudioData = function(buf, ok, err) {
                    var silent = this.createBuffer(1, 1, this.sampleRate);
                    if (ok) { ok(silent); return; }
                    return Promise.resolve(silent);
                };
                p.resume = function() { this.state = 'running'; return Promise.resolve(); };
                p.suspend = function() { this.state = 'suspended'; return Promise.resolve(); };
                p.close = function() { this.state = 'closed'; return Promise.resolve(); };

                window.AudioContext = SilentAudioContext;
                window.webkitAudioContext = SilentAudioContext;
            })();
        }

        /* ── FIX: Intercept fetch for missing audio assets ──
         * Bevy's asset server fetches audio via HTTP. If files are missing,
         * the server may return HTML (404 page) which the decoder can't parse.
         * Return a proper 404 so Bevy handles it as NotFound instead of decoding garbage. */
        (function() {
            var _origFetch = window.fetch;
            window.fetch = function(input) {
                var url = typeof input === 'string' ? input : (input && input.url ? input.url : '');
                var isAssetReq = /\/(assets|sounds?|audio|sfx|music)\//i.test(url)
                    || /\.(ogg|mp3|wav|flac|opus)(\?|$)/i.test(url);
                if (!isAssetReq) return _origFetch.apply(this, arguments);
                return _origFetch.apply(this, arguments).then(function(resp) {
                    var ct = (resp.headers.get('content-type') || '');
                    if (ct.includes('text/html') || ct.includes('application/json')) {
                        return new Response(null, { status: 404, statusText: 'Not Found' });
                    }
                    return resp;
                }).catch(function() {
                    return new Response(null, { status: 404, statusText: 'Not Found' });
                });
            };
        })();

        /* ── FIX: Catch WASM crashes to prevent cascade errors ──
         * Once WASM hits 'unreachable', the instance is dead. Catching the
         * RuntimeError prevents the secondary BorrowMutError from winit. */
        window.addEventListener('error', function(e) {
            if (e.error instanceof WebAssembly.RuntimeError) {
                e.preventDefault();
                wasmCrashed = true;
            }
        });
        window.addEventListener('unhandledrejection', function(e) {
            if (e.reason instanceof WebAssembly.RuntimeError) {
                e.preventDefault();
                wasmCrashed = true;
            }
        });

        /* ── PERF: Cap devicePixelRatio on mobile ──
         * A 3x iPhone renders 9x more pixels than CSS pixels.
         * Capping DPR to 1.0 gives maximum perf — still sharp on small screens. */
        if (useMobileVersion) {
            Object.defineProperty(window, 'devicePixelRatio', {
                get: function() { return 1; },
                configurable: true
            });
        }

        /* ── PERF: Mobile-optimized WebGL context ──
         * Intercept getContext before Bevy/wgpu creates its context.
         * antialias:false is a huge GPU win; desynchronized reduces latency. */
        if (useMobileVersion) {
            var _origGetCtx = HTMLCanvasElement.prototype.getContext;
            HTMLCanvasElement.prototype.getContext = function(type, attrs) {
                if (type === 'webgl2' || type === 'webgl') {
                    attrs = Object.assign({}, attrs || {}, {
                        antialias: false,
                        powerPreference: 'high-performance',
                        desynchronized: true,
                        preserveDrawingBuffer: false
                    });
                }
                return _origGetCtx.call(this, type, attrs);
            };
        }

        /* ── Loading screen version ── */
        if (useMobileVersion) {
            document.getElementById('version-badge').className = 'version-badge mobile';
            document.getElementById('version-label').textContent = 'Mobile';
        }

        /* ── Orientation + fullscreen (mobile only) ── */
        if (isMobile) {
            document.getElementById('touch-hint').style.display = '';
            var dh = document.querySelector('.controls-hint-desktop');
            if (dh) dh.style.display = 'none';

            document.getElementById('fullscreen-btn').addEventListener('click', function() {
                var el = document.documentElement;
                var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (rfs) {
                    rfs.call(el).then(function() {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock('landscape').catch(function() {});
                        }
                    }).catch(function() {});
                }
                rotatePrompt.style.display = 'none';
            });

            function checkOrientation() {
                if (!document.fullscreenElement && window.innerHeight > window.innerWidth) {
                    rotatePrompt.style.display = 'flex';
                } else {
                    rotatePrompt.style.display = 'none';
                }
            }
            window.addEventListener('resize', checkOrientation);
            window.addEventListener('orientationchange', checkOrientation);
            document.addEventListener('fullscreenchange', checkOrientation);
            setTimeout(checkOrientation, 300);
        }

        /* ── Touch controls ── */
        (function() {
            var activeKeys = {};
            var buttons = document.querySelectorAll('.touch-btn');

            function fireKey(type, key, code) {
                if (wasmCrashed) return;
                canvas.dispatchEvent(new KeyboardEvent(type, {
                    key: key, code: code, bubbles: true, cancelable: true
                }));
            }

            function clearAllKeys() {
                Object.keys(activeKeys).forEach(function(k) {
                    clearInterval(activeKeys[k]);
                    delete activeKeys[k];
                });
                buttons.forEach(function(b) { b.classList.remove('active'); });
            }

            buttons.forEach(function(btn) {
                var key = btn.dataset.key;
                var code = btn.dataset.code;
                /* Enter is one-shot (start/restart). Space (fire) repeats
                 * like WASD so the game sees the key as held — matches
                 * physical keyboard auto-repeat and enables continuous fire. */
                var isOneShot = (code === 'Enter');

                function startPress(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (wasmCrashed) return;
                    if (activeKeys[code]) return;
                    btn.classList.add('active');
                    if (navigator.vibrate) navigator.vibrate(12);
                    fireKey('keydown', key, code);
                    if (!isOneShot) {
                        activeKeys[code] = setInterval(function() {
                            if (wasmCrashed) { clearAllKeys(); return; }
                            fireKey('keydown', key, code);
                        }, 60);
                    } else {
                        activeKeys[code] = true;
                    }
                }

                function endPress(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!activeKeys[code]) return;
                    btn.classList.remove('active');
                    if (typeof activeKeys[code] === 'number') clearInterval(activeKeys[code]);
                    delete activeKeys[code];
                    fireKey('keyup', key, code);
                }

                btn.addEventListener('touchstart', startPress, { passive: false });
                btn.addEventListener('touchend', endPress, { passive: false });
                btn.addEventListener('touchcancel', endPress, { passive: false });
                btn.addEventListener('mousedown', startPress);
                btn.addEventListener('mouseup', endPress);
                btn.addEventListener('mouseleave', endPress);
            });
        })();

        /* scroll/zoom prevention handled by CSS touch-action:none on body — no JS listener needed */
    </script>

    <script type="module">
        var isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        var isSmallScreen = window.innerWidth < 768 || (isMobile && window.innerWidth < 1024);
        var useMobileVersion = isMobile || isSmallScreen;

        var progressFill = document.getElementById('progress-fill');
        var loadText = document.getElementById('load-text');
        var loadDetail = document.getElementById('load-detail');

        function mb(bytes) { return (bytes / 1048576).toFixed(1); }

        /**
         * Fetch with real-time download progress.
         * Falls back to opaque fetch if content-length or ReadableStream is unavailable.
         */
        async function fetchWasm(url) {
            var resp = await fetch(url);
            var total = parseInt(resp.headers.get('content-length') || '0', 10);

            if (!total || !resp.body || !resp.body.getReader) {
                loadText.textContent = 'Downloading...';
                return await resp.arrayBuffer();
            }

            progressFill.classList.remove('pulse');
            var reader = resp.body.getReader();
            var chunks = [];
            var received = 0;
            var t0 = performance.now();

            for (;;) {
                var r = await reader.read();
                if (r.done) break;
                chunks.push(r.value);
                received += r.value.length;

                var pct = received / total;
                var speed = received / ((performance.now() - t0) / 1000);

                progressFill.style.width = (pct * 100) + '%';
                loadText.textContent = Math.round(pct * 100) + '%  ·  ' + mb(received) + ' / ' + mb(total) + ' MB';
                loadDetail.textContent = mb(speed) + ' MB/s';
            }

            var buf = new Uint8Array(received);
            var off = 0;
            for (var i = 0; i < chunks.length; i++) { buf.set(chunks[i], off); off += chunks[i].length; }
            return buf.buffer;
        }

        try {
            var jsPath, wasmPath;
            if (useMobileVersion) {
                jsPath  = '/games/cyberpunk_mobile/cyberpunk_rpg-38d753a3bdc27ebc.js';
                wasmPath = '/games/cyberpunk_mobile/cyberpunk_rpg-38d753a3bdc27ebc_bg.wasm';
            } else {
                jsPath  = '/games/cyberpunk/game.js';
                wasmPath = '/games/cyberpunk/game_bg.wasm';
            }

            /* Phase 1 — download WASM with progress */
            loadText.textContent = 'Downloading ' + (useMobileVersion ? 'mobile' : 'desktop') + ' build...';
            var wasmBytes = await fetchWasm(wasmPath);

            /* Phase 2 — compile + initialize */
            progressFill.style.width = '100%';
            progressFill.classList.add('pulse');
            loadText.textContent = 'Compiling WebAssembly...';
            loadDetail.textContent = 'almost ready';

            var mod = await import(jsPath);
            await mod.default({ module_or_path: wasmBytes });

            /* Phase 3 — reveal game */
            var loading = document.getElementById('loading');
            loading.classList.add('hidden');
            setTimeout(function() { loading.style.display = 'none'; }, 500);

            /* Auto-hide top bar after 3s to free up a compositor layer */
            setTimeout(function() {
                document.querySelector('.top-bar').classList.add('auto-hide');
            }, 3000);

            if (isMobile) {
                setTimeout(function() {
                    if (window.innerHeight > window.innerWidth) {
                        document.getElementById('rotate-prompt').style.display = 'flex';
                    }
                }, 500);
            }
        } catch (e) {
            console.error('WASM init failed:', e);
            document.querySelector('.progress-wrap').style.display = 'none';
            document.querySelector('.game-title').style.display = 'none';
            document.getElementById('error-msg').textContent = e.message || 'Unknown error';
            document.getElementById('error').classList.add('show');
        }
    </script>
</body>
</html>
